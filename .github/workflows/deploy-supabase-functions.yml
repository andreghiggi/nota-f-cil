# Deploy Edge Functions → Supabase vdzkhealunurfgrujekg (nota-fácil / Fiscal Flow)
# Secret: SUPABASE_ACCESS_TOKEN → https://supabase.com/dashboard/account/tokens

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_ID: vdzkhealunurfgrujekg

    steps:
      - uses: actions/checkout@v4

      - name: Verificar secret
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Defina SUPABASE_ACCESS_TOKEN em GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy fiscal-api, nfe-api e demais functions
        run: supabase functions deploy --project-ref "$PROJECT_ID"
